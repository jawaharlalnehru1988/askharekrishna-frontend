name: Deploy AskHareKrishna Frontend to VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: askharekrishna-frontend-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 91.99.67.35
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: 22
          script_stop: true
          script: |
            bash /var/www/askharekrishna-platform/frontend/scripts/deploy_vps.sh
